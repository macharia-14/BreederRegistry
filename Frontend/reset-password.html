<!-- Frontend/reset-password.html: page layout for the Animal Breed Registry System. -->
<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>
   Password Reset &mdash; BreedRegistry
  </title>
  <link href="/assets/css/app.css" rel="stylesheet">
  <link href="/assets/css/public.css" rel="stylesheet">
  <link href="/assets/css/pages/public-reset-password.css" rel="stylesheet">
 </head>
 <body>
  <!-- Main page content shown to the user. -->
  <main class="card">
   <div class="brand">
    <img alt="LineageX" src="/images/LineageX.png">
    <strong>
     Livestock Registry
    </strong>
   </div>
   <section id="requestPanel">
    <h1>
     Reset your password
    </h1>
    <p class="muted">
     Enter your breeder email or national ID. If the account exists, we will send a secure reset link.
    </p>
    <!-- Form used to collect and submit user input. -->
    <form id="forgotForm">
     <label>
      Email or National ID
     </label>
     <input autocomplete="username" id="identifier" placeholder="bandi@gmail.com or 11223344" required>
     <button type="submit">
      Send reset link
     </button>
    </form>
   </section>
   <section id="resetPanel" style="display:none">
    <h1>
     Set new password
    </h1>
    <p class="muted">
     Choose a strong password with at least 8 characters.
    </p>
    <form id="resetForm">
     <label>
      New Password
     </label>
     <input autocomplete="new-password" id="newPassword" minlength="8" required type="password">
     <button type="submit">
      Update password
     </button>
    </form>
   </section>
   <div class="msg" id="msg">
   </div>
   <a class="link" href="/login.html">
    Back to login
   </a>
  </main>
  <!-- Scripts loaded for page behavior and API calls. -->
  <script src="/assets/js/core/config.js">
  </script>
  <script src="/assets/js/core/api.js">
  </script>
  <script src="/assets/js/core/ui.js">
  </script>
  <script src="/assets/js/core/common.js">
  </script>
  <script src="/assets/js/public.js">
  </script>
  <script src="/assets/js/pages/public-reset-password.js">
  </script>
 </body>
</html>
