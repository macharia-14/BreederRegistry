<!-- Frontend/admin/animal-management.html: page layout for the Animal Breed Registry System. -->
<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>
   Admin Dashboard - Animal Management
  </title>
  <link href="/assets/css/app.css" rel="stylesheet">
  <link href="/assets/css/admin.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="/assets/css/shell-standard.css" rel="stylesheet">
 </head>
 <body>
  <button aria-controls="sidebar" aria-expanded="false" aria-label="Open sidebar" class="menu-toggle" id="menu-toggle" type="button">
   <i aria-hidden="true" class="fa fa-bars">
   </i>
  </button>
  <!-- Sidebar navigation shared across dashboard pages. -->
  <aside class="sidebar" id="sidebar">
   <div class="logo">
    <img alt="LineageX" class="logo-img" src="/images/lineagex-app-icon.png">
    <div class="logo-copy">
     <div class="logo-title">
      Livestock Registry
     </div>
     <div class="logo-subtitle">
      Admin Console
     </div>
    </div>
   </div>
   <!-- Navigation links for moving between related pages. -->
   <nav aria-label="Admin Console navigation" class="nav-menu">
    <a class="nav-item" href="overview.html">
     <span class="nav-icon">
      <i aria-hidden="true" class="fa fa-tachometer-alt">
      </i>
     </span>
     Overview
    </a>
    <a class="nav-item" href="breeder-management.html">
     <span class="nav-icon">
      <i aria-hidden="true" class="fa fa-users">
      </i>
     </span>
     Breeder Management
    </a>
    <a class="nav-item active" href="animal-management.html">
     <span class="nav-icon">
      <i aria-hidden="true" class="fa fa-paw">
      </i>
     </span>
     Animal Management
    </a>
    <a class="nav-item" href="breeding-monitoring.html">
     <span class="nav-icon">
      <i aria-hidden="true" class="fa fa-heartbeat">
      </i>
     </span>
     Breeding Monitoring
    </a>
    <a class="nav-item" href="reports-analytics.html">
     <span class="nav-icon">
      <i aria-hidden="true" class="fa fa-chart-line">
      </i>
     </span>
     Reports & Analytics
    </a>
    <a class="nav-item" href="settings.html">
     <span class="nav-icon">
      <i aria-hidden="true" class="fa fa-cog">
      </i>
     </span>
     Settings
    </a>
   </nav>
   <button class="logout-btn" id="logoutBtn" type="button">
    <i aria-hidden="true" class="fa fa-sign-out-alt">
    </i>
    Logout
   </button>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay">
  </div>
  <!-- Main page content shown to the user. -->
  <main class="main-content">
   <div class="page-header">
    <h1 class="page-title">
     Admin Dashboard
    </h1>
   </div>
   <div class="management-section">
    <div class="section-header">
     <h2 class="section-title">
      Animal Management
     </h2>
    </div>
    <div class="filters">
     <select class="filter-select" id="filterAll">
      <option value="all">
       All
      </option>
      <option value="cattle">
       Cattle
      </option>
      <option value="goat">
       Goat
      </option>
     </select>
     <select class="filter-select" id="filterSpecies">
      <option value="all">
       All
      </option>
      <option value="cattle">
       Cattle
      </option>
      <option value="goat">
       Goat
      </option>
     </select>
     <select class="filter-select" id="filterBreed">
      <option value="all">
       All Breeds
      </option>
     </select>
     <select class="filter-select" id="filterGender">
      <option value="all">
       All
      </option>
      <option value="female">
       Female
      </option>
      <option value="male">
       Male
      </option>
     </select>
     <select class="filter-select" id="filterBreeder">
      <option value="all">
       All Breeders
      </option>
     </select>
    </div>
    <div class="table-container">
     <table>
      <thead>
       <tr>
        <th>
         Animal ID
        </th>
        <th>
         Species
        </th>
        <th>
         Breed
        </th>
        <th>
         Gender
        </th>
        <th>
         Breeder
        </th>
       </tr>
      </thead>
      <tbody id="animalTableBody">
       <tr>
        <td colspan="5" style="text-align: center; padding: 20px;">
         Loading animals...
        </td>
       </tr>
      </tbody>
     </table>
    </div>
   </div>
  </main>
  <!-- Scripts loaded for page behavior and API calls. -->
  <script src="/assets/js/core/config.js">
  </script>
  <script src="/assets/js/core/api.js">
  </script>
  <script src="/assets/js/core/ui.js">
  </script>
  <script src="/assets/js/core/common.js">
  </script>
  <script src="/assets/js/admin.js">
  </script>
  <script src="/assets/js/pages/admin-animal-management.js">
  </script>
  <script src="/assets/js/sidebar-standard.js">
  </script>
 </body>
</html>
