<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Breeder Management</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .action-menu-container {
        position: relative;
        display: inline-block;
      }

      .action-menu-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 0 5px;
        color: #666;
      }

      .action-menu-btn:hover {
        color: #333;
      }

      .action-dropdown {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        min-width: 180px;
        margin-top: 5px;
      }

      .action-dropdown.show {
        display: block;
      }

      .action-dropdown a {
        display: block;
        padding: 10px 15px;
        color: #333;
        text-decoration: none;
        border-bottom: 1px solid #eee;
        cursor: pointer;
      }

      .action-dropdown a:last-child {
        border-bottom: none;
      }

      .action-dropdown a:hover {
        background-color: #f5f5f5;
      }

      .action-dropdown a.delete {
        color: #d32f2f;
      }

      .action-dropdown a.delete:hover {
        background-color: #ffebee;
      }

      /* Modal styles */
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.4);
      }

      .modal.show {
        display: block;
      }

      .modal-content {
        background-color: #fefefe;
        margin: 10% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 90%;
        max-width: 500px;
        border-radius: 8px;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }

      .modal-header h2 {
        margin: 0;
      }

      .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #666;
      }

      .modal-body {
        margin: 15px 0;
      }

      .info-group {
        margin-bottom: 15px;
      }

      .info-group label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
        color: #555;
      }

      .info-group p {
        margin: 0;
        color: #333;
        word-break: break-word;
      }

      .docs-list {
        list-style: none;
        padding: 0;
      }

      .docs-list li {
        padding: 8px;
        background-color: #f5f5f5;
        margin-bottom: 5px;
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .docs-list a {
        color: #1976d2;
        text-decoration: none;
      }

      .docs-list a:hover {
        text-decoration: underline;
      }

      .modal-footer {
        text-align: right;
        border-top: 1px solid #eee;
        padding-top: 15px;
        margin-top: 15px;
      }

      .modal-footer button {
        margin-left: 10px;
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .modal-footer .btn-primary {
        background-color: #1976d2;
        color: white;
      }

      .modal-footer .btn-cancel {
        background-color: #f0f0f0;
        color: #333;
      }
    </style>
  </head>
  <body>
    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        <div class="logo-title">Breeder Registry</div>
      </div>

      

      <nav class="nav-menu">
        <a href="overview.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-house"></i></span>
          <span>Overview</span>
        </a>

        <a href="breeder-management.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-users"></i></span>
          <span>Breeder Management</span>
        </a>

        <a href="animal-management.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-cow"></i></span>
          <span>Animal Management</span>
        </a>

        <a href="breeding-monitoring.html" class="nav-item">
          <span class="nav-icon"
            ><i class="fa-solid fa-clipboard-list"></i
          ></span>
          <span>Breeding Monitoring</span>
        </a>

        <a href="reports-analytics.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span>
          <span>Reports & Analytics</span>
        </a>

        <a href="settings.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-gear"></i></span>
          <span>Settings</span>
        </a>
      </nav>

      <div class="version">v1</div>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Admin Dashboard</h1>
      </div>

      <!-- Breeder Management Section -->
      <div class="management-section">
        <div class="section-header">
          <h2 class="section-title">Breeder Management / Verification</h2>
          <div class="export-buttons">
            <button class="btn" onclick="exportCSV()">Export CSV</button>
            <button class="btn" onclick="exportPDF()">Export PDF</button>
          </div>
        </div>

        <!-- Filters -->
        <div class="filters">
          <select class="filter-select" id="filterStatus">
            <option value="all">All</option>
            <option value="approved">Approved</option>
            <option value="pending">Pending</option>
            <option value="rejected">Rejected</option>
          </select>
          <select class="filter-select" id="filterSpecies">
            <option value="all">All</option>
            <option value="cattle">Cattle</option>
            <option value="goats">Goats</option>
            <option value="sheep">Sheep</option>
          </select>
        </div>

        <!-- Breeder Table -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Breeder</th>
                <th>Farm</th>
                <th>County</th>
                <th>Species</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="breederTableBody">
              <tr>
                <td colspan="6" style="text-align: center; padding: 20px;">Loading breeders...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Breeder Info Modal -->
    <div id="breederInfoModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Breeder Information</h2>
          <button class="modal-close" onclick="closeBreederInfo()">&times;</button>
        </div>
        <div class="modal-body" id="breederInfoContent">
          <!-- Content will be populated by JavaScript -->
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeBreederInfo()">Close</button>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
    <script>
      // Toggle action menu dropdown
      function toggleActionMenu(event) {
        event.stopPropagation();
        const dropdown = event.target.nextElementSibling;
        
        // Close all other dropdowns
        document.querySelectorAll('.action-dropdown').forEach(menu => {
          if (menu !== dropdown) menu.classList.remove('show');
        });
        
        dropdown.classList.toggle('show');
      }

      // Close dropdown when clicking outside
      document.addEventListener('click', () => {
        document.querySelectorAll('.action-dropdown').forEach(menu => {
          menu.classList.remove('show');
        });
      });

      // Open breeder info modal
      async function openBreederInfo(breederId) {
        document.querySelectorAll('.action-dropdown').forEach(menu => {
          menu.classList.remove('show');
        });

        try {
          const res = await fetch(`/api/breeders/${breederId}`);
          if (!res.ok) throw new Error('Failed to fetch breeder info');
          const breeder = await res.json();

          const modal = document.getElementById('breederInfoModal');
          const content = document.getElementById('breederInfoContent');

          let docsHtml = '<p>No documents uploaded</p>';
          if (breeder.documents) {
            const docs = breeder.documents.split(',').filter(doc => doc.trim());
            if (docs.length > 0) {
              docsHtml = '<ul class="docs-list">';
              docs.forEach(doc => {
                const docName = doc.trim();
                docsHtml += `<li><span>${docName}</span><i class="fas fa-file"></i></li>`;
              });
              docsHtml += '</ul>';
            }
          }

          content.innerHTML = `
            <div class="info-group">
              <label>Full Name</label>
              <p>${breeder.full_name || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>Email</label>
              <p>${breeder.email || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>Phone</label>
              <p>${breeder.phone || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>Farm Name</label>
              <p>${breeder.farm_name || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>Farm Location</label>
              <p>${breeder.farm_location || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>County</label>
              <p>${breeder.county || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>Animal Type</label>
              <p>${breeder.animal_type || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>Farm Prefix</label>
              <p>${breeder.farm_prefix || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>National ID</label>
              <p>${breeder.national_id || 'N/A'}</p>
            </div>
            <div class="info-group">
              <label>Status</label>
              <p><span class="status-badge status-${breeder.status || 'pending'}">${breeder.status || 'pending'}</span></p>
            </div>
            <div class="info-group">
              <label>Uploaded Documents</label>
              ${docsHtml}
            </div>
          `;

          modal.classList.add('show');
        } catch (error) {
          console.error('Error opening breeder info:', error);
          alert('Error loading breeder information: ' + error.message);
        }
      }

      // Close breeder info modal
      function closeBreederInfo() {
        document.getElementById('breederInfoModal').classList.remove('show');
      }

      // Delete breeder
      async function deleteBreeder(breederId) {
        if (!confirm('Are you sure you want to delete this breeder? This action cannot be undone.')) return;
        
        try {
          const res = await fetch(`/api/admins/breeders/${breederId}`, { method: 'DELETE' });
          if (!res.ok) {
            const error = await res.json();
            throw new Error(error.detail || 'Failed to delete breeder');
          }
          
          alert('Breeder deleted successfully!');
          loadBreeders(); // Reload the table
        } catch (error) {
          console.error('Error deleting breeder:', error);
          alert('Error deleting breeder: ' + error.message);
        }
      }
      // Fetch and load all breeders
      async function loadBreeders() {
        try {
          const res = await fetch('/api/admins/approved-breeders');
          if (!res.ok) throw new Error('Failed to fetch approved breeders');
          const approvedBreeders = await res.json();

          const pendingRes = await fetch('/api/admins/applications');
          if (!pendingRes.ok) throw new Error('Failed to fetch pending applications');
          const pendingBreeders = await pendingRes.json();

          const rejectedRes = await fetch('/api/admins/rejected-applications');
          if (!rejectedRes.ok) throw new Error('Failed to fetch rejected applications');
          const rejectedBreeders = await rejectedRes.json();

          // Combine all breeders
          const allBreeders = [
            ...approvedBreeders.map(b => ({...b, status: 'approved'})),
            ...pendingBreeders.map(b => ({...b, status: 'pending'})),
            ...rejectedBreeders.map(b => ({...b, status: 'rejected'}))
          ];

          const tableBody = document.getElementById('breederTableBody');
          tableBody.innerHTML = ''; // Clear loading message

          if (allBreeders.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">No breeders found</td></tr>';
            return;
          }

          // Populate table rows
          allBreeders.forEach(breeder => {
            const row = document.createElement('tr');
            row.setAttribute('data-status', breeder.status);
            row.setAttribute('data-species', (breeder.animal_type || '').toLowerCase());
            
            let actionsHtml = '';
            if (breeder.status === 'pending') {
              actionsHtml = `
                <div style="display: flex; gap: 10px; align-items: center;">
                  <div class="action-buttons">
                    <button class="action-btn btn-approve" onclick="approveBreeder(this, ${breeder.id})">Approve</button>
                    <button class="action-btn btn-reject" onclick="rejectBreeder(this, ${breeder.id})">Reject</button>
                  </div>
                  <div class="action-menu-container">
                    <button class="action-menu-btn" onclick="toggleActionMenu(event)" title="More actions">⋮</button>
                    <div class="action-dropdown">
                      <a onclick="openBreederInfo(${breeder.id})"><i class="fas fa-info-circle"></i> View Info</a>
                      <a class="delete" onclick="deleteBreeder(${breeder.id})"><i class="fas fa-trash"></i> Remove Breeder</a>
                    </div>
                  </div>
                </div>
              `;
            } else if (breeder.status === 'approved') {
              actionsHtml = `
                <div style="display: flex; gap: 10px; align-items: center;">
                  <div class="action-menu-container">
                    <button class="action-menu-btn" onclick="toggleActionMenu(event)" title="More actions">⋮</button>
                    <div class="action-dropdown">
                      <a onclick="openBreederInfo(${breeder.id})"><i class="fas fa-info-circle"></i> View Info</a>
                      <a class="delete" onclick="deleteBreeder(${breeder.id})"><i class="fas fa-trash"></i> Remove Breeder</a>
                    </div>
                  </div>
                </div>
              `;
            } else if (breeder.status === 'rejected') {
              actionsHtml = `
                <div style="display: flex; gap: 10px; align-items: center;">
                  <span class="action-rejected">rejected</span>
                  <div class="action-menu-container">
                    <button class="action-menu-btn" onclick="toggleActionMenu(event)" title="More actions">⋮</button>
                    <div class="action-dropdown">
                      <a onclick="openBreederInfo(${breeder.id})"><i class="fas fa-info-circle"></i> View Info</a>
                      <a class="delete" onclick="deleteBreeder(${breeder.id})"><i class="fas fa-trash"></i> Remove Breeder</a>
                    </div>
                  </div>
                </div>
              `;
            }

            const statusClass = `status-${breeder.status}`;
            row.innerHTML = `
              <td>${breeder.full_name || 'N/A'}</td>
              <td>${breeder.farm_name || 'N/A'}</td>
              <td>${breeder.county || 'N/A'}</td>
              <td>${breeder.animal_type || 'N/A'}</td>
              <td><span class="status-badge ${statusClass}">${breeder.status}</span></td>
              <td>${actionsHtml}</td>
            `;
            tableBody.appendChild(row);
          });
        } catch (error) {
          console.error('Error loading breeders:', error);
          const tableBody = document.getElementById('breederTableBody');
          tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: red;">Error loading breeders: ${error.message}</td></tr>`;
        }
      }

      // Approve breeder function
      async function approveBreeder(button, breederId) {
        if (!confirm('Are you sure you want to approve this breeder?')) return;
        
        try {
          const res = await fetch(`/api/admins/approve/${breederId}`, { method: 'POST' });
          if (!res.ok) throw new Error('Failed to approve breeder');
          
          alert('Breeder approved successfully!');
          loadBreeders(); // Reload the table
        } catch (error) {
          console.error('Error approving breeder:', error);
          alert('Error approving breeder: ' + error.message);
        }
      }

      // Reject breeder function
      async function rejectBreeder(button, breederId) {
        if (!confirm('Are you sure you want to reject this breeder?')) return;
        
        try {
          const res = await fetch(`/api/admins/reject/${breederId}`, { method: 'POST' });
          if (!res.ok) throw new Error('Failed to reject breeder');
          
          alert('Breeder rejected successfully!');
          loadBreeders(); // Reload the table
        } catch (error) {
          console.error('Error rejecting breeder:', error);
          alert('Error rejecting breeder: ' + error.message);
        }
      }

      // Filter table function
      function filterTable() {
        const statusValue = document.getElementById('filterStatus').value;
        const speciesValue = document.getElementById('filterSpecies').value;
        const rows = document.querySelectorAll('#breederTableBody tr');

        rows.forEach(row => {
          const rowStatus = row.getAttribute('data-status');
          const rowSpecies = row.getAttribute('data-species');

          const statusMatch = statusValue === 'all' || rowStatus === statusValue;
          const speciesMatch = speciesValue === 'all' || rowSpecies === speciesValue;

          if (statusMatch && speciesMatch) {
            row.style.display = '';
          } else {
            row.style.display = 'none';
          }
        });
      }

      // Export functions
      function exportCSV() {
        alert('Exporting breeder data as CSV...');
        // Implementation would go here
      }

      function exportPDF() {
        alert('Exporting breeder data as PDF...');
        // Implementation would go here
      }

      // Add event listeners to filters
      document.addEventListener('DOMContentLoaded', () => {
        loadBreeders();

        const filterStatus = document.getElementById('filterStatus');
        const filterSpecies = document.getElementById('filterSpecies');

        filterStatus.addEventListener('change', filterTable);
        filterSpecies.addEventListener('change', filterTable);
      });
  
      (function(){
        const btn = document.getElementById('logoutBtn');
        if (btn) {
          btn.addEventListener('click', function(e){
            localStorage.removeItem('admin');
            localStorage.removeItem('breeder');
            localStorage.removeItem('token');
            localStorage.removeItem('admin_id');
            localStorage.removeItem('breeder_id');
            window.location.href = '/index.html';
          });
        }
      })();
    </script>
  </body>
</html>
