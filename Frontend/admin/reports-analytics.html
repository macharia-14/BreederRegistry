<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Reports & Analytics</title>
    <link rel="stylesheet" href="./css/admin.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

     <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        <div class="logo-title">Breeder Registry</div>
      </div>

      
      <nav class="nav-menu">
        <a href="overview.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-house"></i></span>
          <span>Overview</span>
        </a>

        <a href="breeder-management.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-users"></i></span>
          <span>Breeder Management</span>
        </a>

        <a href="animal-management.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-cow"></i></span>
          <span>Animal Management</span>
        </a>

        <a href="breeding-monitoring.html" class="nav-item">
          <span class="nav-icon"
            ><i class="fa-solid fa-clipboard-list"></i
          ></span>
          <span>Breeding Monitoring</span>
        </a>

        <a href="reports-analytics.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span>
          <span>Reports & Analytics</span>
        </a>

        <a href="settings.html" class="nav-item">
          <span class="nav-icon"><i class="fa-solid fa-gear"></i></span>
          <span>Settings</span>
        </a>
      </nav>

      <div class="version">v1</div>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Admin Dashboard</h1>
      </div>

      <!-- Reports & Analytics Section -->
      <div class="reports-section">
        <h2 class="section-title">Reports & Analytics</h2>

        <div class="export-buttons">
          <button class="export-btn" onclick="exportBreedersCSV()">
            <span class="btn-icon">📄</span>
            <span>Export Breeders CSV</span>
          </button>
          <button class="export-btn" onclick="exportSystemPDF()">
            <span class="btn-icon">📋</span>
            <span>Export System PDF</span>
          </button>
        </div>
      </div>
    </main>

    <script src="js/script.js"></script>
    <script>
      (function(){
        const btn = document.getElementById('logoutBtn');
        if (btn) {
          btn.addEventListener('click', function(e){
            localStorage.removeItem('admin');
            localStorage.removeItem('breeder');
            localStorage.removeItem('token');
            localStorage.removeItem('admin_id');
            localStorage.removeItem('breeder_id');
            window.location.href = '/index.html';
          });
        }
      })();
    </script>
  </body>
</html>
